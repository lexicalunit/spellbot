# Config Documentation: https://docs.github.com/en/code-security/supply-chain-security/configuration-options-for-dependency-updates#about-the-dependabotyml-file
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/docs"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    labels:
      - "dependencies"
      - "docs"
    commit-message:
      prefix: "deps-docs"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/infrastructure/app"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 30
    labels:
      - "dependencies"
      - "infrastructure"
    commit-message:
      prefix: "infra"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/infrastructure/db"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 30
    labels:
      - "dependencies"
      - "infrastructure"
    commit-message:
      prefix: "infra"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/infrastructure/o11y"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 30
    labels:
      - "dependencies"
      - "infrastructure"
    commit-message:
      prefix: "infra"
      include: "scope"
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"
