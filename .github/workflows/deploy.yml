name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy to (stage or prod)"
        required: true
        type: string
      image-tag-suffix:
        description: "Additional tag suffix for the Docker image"
        required: false
        type: string
        default: ""

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: spellbot-app
  ECS_CLUSTER: spellbot-cluster

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    # Serialize deploys that share a commit SHA so a stage push to `main` and a
    # prod tag deploy of the same commit (or a re-run of either) can never both
    # try to upload the immutable SHA tag at the same time.
    concurrency:
      group: deploy-image-${{ github.sha }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy-${{ inputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment-specific variables
        id: env-vars
        run: |
          if [[ "${{ inputs.environment }}" == "stage" ]]; then
            echo "ecs-service=spellbot-stage" >> $GITHUB_OUTPUT
            echo "task-definition-family=spellbot-stage" >> $GITHUB_OUTPUT
          elif [[ "${{ inputs.environment }}" == "prod" ]]; then
            echo "ecs-service=spellbot-prod" >> $GITHUB_OUTPUT
            echo "task-definition-family=spellbot-prod" >> $GITHUB_OUTPUT
          else
            echo "Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi

      - name: Get ECR repository URI
        id: ecr-uri
        run: |
          ECR_URI=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          echo "ecr-uri=$ECR_URI" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Get short SHA
        id: short-sha
        run: echo "short-sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Check if image already exists
        id: check-image
        run: |
          IMAGE_TAG="${{ steps.short-sha.outputs.short-sha }}"
          set +e
          ERR=$(aws ecr describe-images \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageTag="$IMAGE_TAG" 2>&1 >/dev/null)
          STATUS=$?
          set -e
          if [[ $STATUS -eq 0 ]]; then
            echo "Image with tag $IMAGE_TAG already exists in ECR, skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          elif echo "$ERR" | grep -q "ImageNotFoundException"; then
            echo "Image with tag $IMAGE_TAG does not exist, will build and push"
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "Unexpected error from describe-images:"
            echo "$ERR"
            exit 1
          fi

      - name: Build and push Docker image
        if: steps.check-image.outputs.exists == 'false'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.ecr-uri.outputs.ecr-uri }}:${{ steps.short-sha.outputs.short-sha }}
          build-args: |
            DD_VERSION=${{ steps.short-sha.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Apply environment alias tags
        # Always run, even when the build was skipped, so that aliases like
        # `latest`, `prod`, `stage`, and `pr-<n>` always point at the SHA we are
        # actually deploying. `aws ecr put-image` is idempotent: when an alias
        # already points at this manifest it returns ImageAlreadyExistsException
        # which we treat as a no-op.
        run: |
          REPO="${{ env.ECR_REPOSITORY }}"
          SHA_TAG="${{ steps.short-sha.outputs.short-sha }}"

          ALIASES=()
          if [[ "${{ inputs.environment }}" == "stage" ]]; then
            ALIASES+=("stage")
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              ALIASES+=("pr-${{ github.event.number }}")
            fi
          elif [[ "${{ inputs.environment }}" == "prod" ]]; then
            ALIASES+=("latest" "prod")
          fi
          if [[ -n "${{ inputs.image-tag-suffix }}" ]]; then
            ALIASES+=("${{ inputs.image-tag-suffix }}")
          fi

          if [[ ${#ALIASES[@]} -eq 0 ]]; then
            echo "No alias tags to apply"
            exit 0
          fi

          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "$REPO" \
            --image-ids imageTag="$SHA_TAG" \
            --query 'images[0].imageManifest' \
            --output text)
          if [[ -z "$MANIFEST" || "$MANIFEST" == "None" ]]; then
            echo "Could not retrieve manifest for tag $SHA_TAG"
            exit 1
          fi

          for ALIAS in "${ALIASES[@]}"; do
            echo "Applying alias tag '$ALIAS' -> $SHA_TAG"
            set +e
            ERR=$(aws ecr put-image \
              --repository-name "$REPO" \
              --image-tag "$ALIAS" \
              --image-manifest "$MANIFEST" 2>&1 >/dev/null)
            STATUS=$?
            set -e
            if [[ $STATUS -eq 0 ]]; then
              continue
            fi
            if echo "$ERR" | grep -q "ImageAlreadyExistsException"; then
              echo "Alias '$ALIAS' already points at this manifest"
              continue
            fi
            echo "Failed to apply alias '$ALIAS':"
            echo "$ERR"
            exit 1
          done

      - name: Deploy to ECS
        id: deploy
        run: |
          IMAGE_URI="${{ steps.ecr-uri.outputs.ecr-uri }}:${{ steps.short-sha.outputs.short-sha }}"
          ./scripts/deploy-ecs.sh "$IMAGE_URI" "${{ inputs.environment }}"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image URI:** ${{ steps.ecr-uri.outputs.ecr-uri }}:${{ steps.short-sha.outputs.short-sha }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.check-image.outputs.exists }}" == "true" ]]; then
            echo "- **Image Build:** Skipped (image already exists in ECR)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Image Build:** Built and pushed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **ECS Service:** ${{ steps.env-vars.outputs.ecs-service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS Cluster:** ${{ env.ECS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Task Definition Family:** ${{ steps.env-vars.outputs.task-definition-family }}" >> $GITHUB_STEP_SUMMARY
